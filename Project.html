<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="Project.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form >
            <div class="amount">
                <label for="Amount">Amount: </label>
                <input type="text" placeholder="Enter Amount" value="19">

            </div>
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select container"></div>
                    <img src="https://flagsapi.com/US/flat/64.png" alt="Currency Flag">
                    <select name="from">
                        <!-- <option value="USD">USD</option>
                        <option value="INR">INR</option>
                        <option value="EUR">EUR</option>
                        <option value="AUD">AUD</option> -->
                    </select>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <div class="to">
                    <p>To</p>
                    <div class="select container"></div>
                    <img src="https://flagsapi.com/IN/flat/64.png" alt="Currency Flag">
                    <select name="to">
                        <!-- <option value="USD">USD</option>
                        <option value="INR" selected>INR</option>
                        <option value="EUR">EUR</option>
                        <option value="AUD">AUD</option> -->
                    </select>
                </div>
            </div>
            <div class="msg"> 1 USD  = 90 INR</div>
            <button id="btn">Get Exchange Rate</button>
        </form>
    </div>
    <script src="Project_Code.js"></script>
    <script src="Project.js"></script>
</body>
</html>
